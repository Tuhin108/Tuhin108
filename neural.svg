<svg width="800" height="190" viewBox="0 0 800 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse-stroke-in {
        0%, 100% { stroke-opacity: 0.35; }
        50% { stroke-opacity: 1.0; }
      }
      @keyframes pulse-fill-in {
        0%, 100% { fill-opacity: 0.1; }
        50% { fill-opacity: 0.35; }
      }
      @keyframes pulse-stroke-hid {
        0%, 100% { stroke-opacity: 0.35; }
        50% { stroke-opacity: 1.0; }
      }
      @keyframes pulse-fill-hid {
        0%, 100% { fill-opacity: 0.1; }
        50% { fill-opacity: 0.35; }
      }
      @keyframes pulse-stroke-out {
        0%, 100% { stroke-opacity: 0.35; }
        50% { stroke-opacity: 1.0; }
      }
      @keyframes pulse-fill-out {
        0%, 100% { fill-opacity: 0.1; }
        50% { fill-opacity: 0.35; }
      }
      @keyframes signal-ih {
        0%   { stroke-dashoffset: 250; stroke-opacity: 0; }
        15%  { stroke-opacity: 0.9; }
        85%  { stroke-opacity: 0.9; }
        100% { stroke-dashoffset: -250; stroke-opacity: 0; }
      }
      @keyframes signal-ho {
        0%   { stroke-dashoffset: 250; stroke-opacity: 0; }
        15%  { stroke-opacity: 0.9; }
        85%  { stroke-opacity: 0.9; }
        100% { stroke-dashoffset: -250; stroke-opacity: 0; }
      }
      @keyframes conn-fade {
        0%, 100% { opacity: 0.12; }
        50% { opacity: 0.30; }
      }

      .grid-line { stroke: #00f5d4; stroke-width: 0.4; opacity: 0.12; }

      .ni { fill: none; stroke: #00d4ff; stroke-width: 2; }
      .nig { fill: #00d4ff; }
      .nic { fill: #00d4ff; }

      .nh { fill: none; stroke: #00f5d4; stroke-width: 2; }
      .nhg { fill: #00f5d4; }
      .nhc { fill: #00f5d4; }

      .no { fill: none; stroke: #39ff14; stroke-width: 2.2; }
      .nog { fill: #39ff14; }
      .noc { fill: #39ff14; }

      .conn-ih-static { stroke: #00d4ff; stroke-width: 0.7; fill: none; animation: conn-fade 3s ease-in-out infinite; }
      .conn-ho-static { stroke: #39ff14; stroke-width: 0.7; fill: none; animation: conn-fade 3s ease-in-out 1.2s infinite; }

      .sig-ih { fill: none; stroke: #00f5d4; stroke-width: 2.5; stroke-dasharray: 10 240; animation: signal-ih 3.2s ease-in-out infinite; }
      .sig-ho { fill: none; stroke: #b0ff60; stroke-width: 2.5; stroke-dasharray: 10 240; animation: signal-ho 3.2s ease-in-out 1.3s infinite; }

      .ni1s { animation: pulse-stroke-in 2.4s ease-in-out 0.0s infinite; }
      .ni2s { animation: pulse-stroke-in 2.4s ease-in-out 0.25s infinite; }
      .ni3s { animation: pulse-stroke-in 2.4s ease-in-out 0.50s infinite; }
      .ni4s { animation: pulse-stroke-in 2.4s ease-in-out 0.75s infinite; }

      .ni1g { animation: pulse-fill-in 2.4s ease-in-out 0.0s infinite; }
      .ni2g { animation: pulse-fill-in 2.4s ease-in-out 0.25s infinite; }
      .ni3g { animation: pulse-fill-in 2.4s ease-in-out 0.50s infinite; }
      .ni4g { animation: pulse-fill-in 2.4s ease-in-out 0.75s infinite; }

      .nh1s { animation: pulse-stroke-hid 2.4s ease-in-out 0.9s infinite; }
      .nh2s { animation: pulse-stroke-hid 2.4s ease-in-out 1.1s infinite; }
      .nh3s { animation: pulse-stroke-hid 2.4s ease-in-out 1.3s infinite; }
      .nh4s { animation: pulse-stroke-hid 2.4s ease-in-out 1.5s infinite; }
      .nh5s { animation: pulse-stroke-hid 2.4s ease-in-out 1.7s infinite; }

      .nh1g { animation: pulse-fill-hid 2.4s ease-in-out 0.9s infinite; }
      .nh2g { animation: pulse-fill-hid 2.4s ease-in-out 1.1s infinite; }
      .nh3g { animation: pulse-fill-hid 2.4s ease-in-out 1.3s infinite; }
      .nh4g { animation: pulse-fill-hid 2.4s ease-in-out 1.5s infinite; }
      .nh5g { animation: pulse-fill-hid 2.4s ease-in-out 1.7s infinite; }

      .no1s { animation: pulse-stroke-out 2.4s ease-in-out 2.0s infinite; }
      .no2s { animation: pulse-stroke-out 2.4s ease-in-out 2.2s infinite; }
      .no3s { animation: pulse-stroke-out 2.4s ease-in-out 2.4s infinite; }

      .no1g { animation: pulse-fill-out 2.4s ease-in-out 2.0s infinite; }
      .no2g { animation: pulse-fill-out 2.4s ease-in-out 2.2s infinite; }
      .no3g { animation: pulse-fill-out 2.4s ease-in-out 2.4s infinite; }

      .lbl  { font-family: 'Courier New', Courier, monospace; font-size: 8.5px; }
      .lbl-in  { fill: #00d4ff; }
      .lbl-hid { fill: #00f5d4; }
      .lbl-out { fill: #39ff14; }
      .lbl-lay { fill: #606090; font-size: 9px; }
      .title-txt { font-family: 'Courier New', Courier, monospace; font-size: 10px; fill: #00f5d4; opacity: 0.65; }
    </style>

    <filter id="blur-blue" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="blur-teal" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="blur-green" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="190" fill="#060612" rx="12"/>

  <!-- Grid -->
  <line class="grid-line" x1="0" y1="38" x2="800" y2="38"/>
  <line class="grid-line" x1="0" y1="76" x2="800" y2="76"/>
  <line class="grid-line" x1="0" y1="114" x2="800" y2="114"/>
  <line class="grid-line" x1="0" y1="152" x2="800" y2="152"/>
  <line class="grid-line" x1="133" y1="0" x2="133" y2="190"/>
  <line class="grid-line" x1="266" y1="0" x2="266" y2="190"/>
  <line class="grid-line" x1="400" y1="0" x2="400" y2="190"/>
  <line class="grid-line" x1="534" y1="0" x2="534" y2="190"/>
  <line class="grid-line" x1="667" y1="0" x2="667" y2="190"/>

  <!-- Title -->
  <text x="400" y="16" text-anchor="middle" class="title-txt">[ NEURAL ARCHITECTURE ·  FORWARD PROPAGATION ·  INPUT → HIDDEN → OUTPUT ]</text>

  <!-- Dividers -->
  <line x1="300" y1="26" x2="300" y2="165" stroke="#ffffff" stroke-width="0.5" opacity="0.08" stroke-dasharray="5,5"/>
  <line x1="520" y1="26" x2="520" y2="165" stroke="#ffffff" stroke-width="0.5" opacity="0.08" stroke-dasharray="5,5"/>

  <!-- ======================== STATIC CONNECTIONS ======================== -->
  <!-- Input(x=185) nodes: y=50,78,107,135 -->
  <!-- Hidden(x=410) nodes: y=42,68,95,122,148 -->
  <!-- Output(x=635) nodes: y=60,95,130 -->

  <!-- i→h static -->
  <line class="conn-ih-static" x1="197" y1="50"  x2="397" y2="42"/>
  <line class="conn-ih-static" x1="197" y1="50"  x2="397" y2="68"/>
  <line class="conn-ih-static" x1="197" y1="50"  x2="397" y2="95"/>
  <line class="conn-ih-static" x1="197" y1="50"  x2="397" y2="122"/>
  <line class="conn-ih-static" x1="197" y1="50"  x2="397" y2="148"/>

  <line class="conn-ih-static" x1="197" y1="78"  x2="397" y2="42"/>
  <line class="conn-ih-static" x1="197" y1="78"  x2="397" y2="68"/>
  <line class="conn-ih-static" x1="197" y1="78"  x2="397" y2="95"/>
  <line class="conn-ih-static" x1="197" y1="78"  x2="397" y2="122"/>
  <line class="conn-ih-static" x1="197" y1="78"  x2="397" y2="148"/>

  <line class="conn-ih-static" x1="197" y1="107" x2="397" y2="42"/>
  <line class="conn-ih-static" x1="197" y1="107" x2="397" y2="68"/>
  <line class="conn-ih-static" x1="197" y1="107" x2="397" y2="95"/>
  <line class="conn-ih-static" x1="197" y1="107" x2="397" y2="122"/>
  <line class="conn-ih-static" x1="197" y1="107" x2="397" y2="148"/>

  <line class="conn-ih-static" x1="197" y1="135" x2="397" y2="42"/>
  <line class="conn-ih-static" x1="197" y1="135" x2="397" y2="68"/>
  <line class="conn-ih-static" x1="197" y1="135" x2="397" y2="95"/>
  <line class="conn-ih-static" x1="197" y1="135" x2="397" y2="122"/>
  <line class="conn-ih-static" x1="197" y1="135" x2="397" y2="148"/>

  <!-- h→o static -->
  <line class="conn-ho-static" x1="423" y1="42"  x2="621" y2="60"/>
  <line class="conn-ho-static" x1="423" y1="42"  x2="621" y2="95"/>
  <line class="conn-ho-static" x1="423" y1="42"  x2="621" y2="130"/>

  <line class="conn-ho-static" x1="423" y1="68"  x2="621" y2="60"/>
  <line class="conn-ho-static" x1="423" y1="68"  x2="621" y2="95"/>
  <line class="conn-ho-static" x1="423" y1="68"  x2="621" y2="130"/>

  <line class="conn-ho-static" x1="423" y1="95"  x2="621" y2="60"/>
  <line class="conn-ho-static" x1="423" y1="95"  x2="621" y2="95"/>
  <line class="conn-ho-static" x1="423" y1="95"  x2="621" y2="130"/>

  <line class="conn-ho-static" x1="423" y1="122" x2="621" y2="60"/>
  <line class="conn-ho-static" x1="423" y1="122" x2="621" y2="95"/>
  <line class="conn-ho-static" x1="423" y1="122" x2="621" y2="130"/>

  <line class="conn-ho-static" x1="423" y1="148" x2="621" y2="60"/>
  <line class="conn-ho-static" x1="423" y1="148" x2="621" y2="95"/>
  <line class="conn-ho-static" x1="423" y1="148" x2="621" y2="130"/>

  <!-- ======================== ANIMATED SIGNAL LINES ======================== -->
  <line class="sig-ih" x1="197" y1="78"  x2="397" y2="95"  style="animation-delay:0.0s"/>
  <line class="sig-ih" x1="197" y1="50"  x2="397" y2="68"  style="animation-delay:0.4s"/>
  <line class="sig-ih" x1="197" y1="107" x2="397" y2="122" style="animation-delay:0.8s"/>
  <line class="sig-ih" x1="197" y1="135" x2="397" y2="148" style="animation-delay:1.1s"/>

  <line class="sig-ho" x1="423" y1="68"  x2="621" y2="60"  style="animation-delay:1.3s"/>
  <line class="sig-ho" x1="423" y1="95"  x2="621" y2="95"  style="animation-delay:1.6s"/>
  <line class="sig-ho" x1="423" y1="122" x2="621" y2="130" style="animation-delay:2.0s"/>

  <!-- ======================== INPUT NODES (x=185) ======================== -->
  <!-- Node 1 y=50 -->
  <circle cx="185" cy="50"  r="16" class="nig ni1g" opacity="0.1" filter="url(#blur-blue)"/>
  <circle cx="185" cy="50"  r="12" class="nig ni1g" opacity="0.1"/>
  <circle cx="185" cy="50"  r="12" class="ni ni1s"/>
  <circle cx="185" cy="50"  r="4"  class="nic" opacity="0.95"/>

  <!-- Node 2 y=78 -->
  <circle cx="185" cy="78"  r="16" class="nig ni2g" opacity="0.1" filter="url(#blur-blue)"/>
  <circle cx="185" cy="78"  r="12" class="nig ni2g" opacity="0.1"/>
  <circle cx="185" cy="78"  r="12" class="ni ni2s"/>
  <circle cx="185" cy="78"  r="4"  class="nic" opacity="0.95"/>

  <!-- Node 3 y=107 -->
  <circle cx="185" cy="107" r="16" class="nig ni3g" opacity="0.1" filter="url(#blur-blue)"/>
  <circle cx="185" cy="107" r="12" class="nig ni3g" opacity="0.1"/>
  <circle cx="185" cy="107" r="12" class="ni ni3s"/>
  <circle cx="185" cy="107" r="4"  class="nic" opacity="0.95"/>

  <!-- Node 4 y=135 -->
  <circle cx="185" cy="135" r="16" class="nig ni4g" opacity="0.1" filter="url(#blur-blue)"/>
  <circle cx="185" cy="135" r="12" class="nig ni4g" opacity="0.1"/>
  <circle cx="185" cy="135" r="12" class="ni ni4s"/>
  <circle cx="185" cy="135" r="4"  class="nic" opacity="0.95"/>

  <!-- ======================== HIDDEN NODES (x=410) ======================== -->
  <circle cx="410" cy="42"  r="18" class="nhg nh1g" opacity="0.1" filter="url(#blur-teal)"/>
  <circle cx="410" cy="42"  r="13" class="nhg nh1g" opacity="0.1"/>
  <circle cx="410" cy="42"  r="13" class="nh nh1s"/>
  <circle cx="410" cy="42"  r="4.5" class="nhc" opacity="0.95"/>

  <circle cx="410" cy="68"  r="18" class="nhg nh2g" opacity="0.1" filter="url(#blur-teal)"/>
  <circle cx="410" cy="68"  r="13" class="nhg nh2g" opacity="0.1"/>
  <circle cx="410" cy="68"  r="13" class="nh nh2s"/>
  <circle cx="410" cy="68"  r="4.5" class="nhc" opacity="0.95"/>

  <circle cx="410" cy="95"  r="18" class="nhg nh3g" opacity="0.1" filter="url(#blur-teal)"/>
  <circle cx="410" cy="95"  r="13" class="nhg nh3g" opacity="0.1"/>
  <circle cx="410" cy="95"  r="13" class="nh nh3s"/>
  <circle cx="410" cy="95"  r="4.5" class="nhc" opacity="0.95"/>

  <circle cx="410" cy="122" r="18" class="nhg nh4g" opacity="0.1" filter="url(#blur-teal)"/>
  <circle cx="410" cy="122" r="13" class="nhg nh4g" opacity="0.1"/>
  <circle cx="410" cy="122" r="13" class="nh nh4s"/>
  <circle cx="410" cy="122" r="4.5" class="nhc" opacity="0.95"/>

  <circle cx="410" cy="148" r="18" class="nhg nh5g" opacity="0.1" filter="url(#blur-teal)"/>
  <circle cx="410" cy="148" r="13" class="nhg nh5g" opacity="0.1"/>
  <circle cx="410" cy="148" r="13" class="nh nh5s"/>
  <circle cx="410" cy="148" r="4.5" class="nhc" opacity="0.95"/>

  <!-- ======================== OUTPUT NODES (x=635) ======================== -->
  <circle cx="635" cy="60"  r="20" class="nog no1g" opacity="0.1" filter="url(#blur-green)"/>
  <circle cx="635" cy="60"  r="14" class="nog no1g" opacity="0.1"/>
  <circle cx="635" cy="60"  r="14" class="no no1s"/>
  <circle cx="635" cy="60"  r="5"  class="noc" opacity="0.95"/>

  <circle cx="635" cy="95"  r="20" class="nog no2g" opacity="0.1" filter="url(#blur-green)"/>
  <circle cx="635" cy="95"  r="14" class="nog no2g" opacity="0.1"/>
  <circle cx="635" cy="95"  r="14" class="no no2s"/>
  <circle cx="635" cy="95"  r="5"  class="noc" opacity="0.95"/>

  <circle cx="635" cy="130" r="20" class="nog no3g" opacity="0.1" filter="url(#blur-green)"/>
  <circle cx="635" cy="130" r="14" class="nog no3g" opacity="0.1"/>
  <circle cx="635" cy="130" r="14" class="no no3s"/>
  <circle cx="635" cy="130" r="5"  class="noc" opacity="0.95"/>

  <!-- ======================== LABELS ======================== -->
  <!-- Input labels (left) -->
  <text x="113" y="54"  class="lbl lbl-in" text-anchor="end">Python</text>
  <text x="113" y="82"  class="lbl lbl-in" text-anchor="end">Data</text>
  <text x="113" y="111" class="lbl lbl-in" text-anchor="end">NLP</text>
  <text x="113" y="139" class="lbl lbl-in" text-anchor="end">LLMs</text>

  <!-- Output labels (right) -->
  <text x="660" y="64"  class="lbl lbl-out">AI / ML</text>
  <text x="660" y="99"  class="lbl lbl-out">GenAI</text>
  <text x="660" y="134" class="lbl lbl-out">Cloud</text>

  <!-- Layer bottom labels -->
  <text x="185" y="174" class="lbl lbl-lay" text-anchor="middle">INPUT</text>
  <text x="410" y="174" class="lbl lbl-lay" text-anchor="middle">HIDDEN</text>
  <text x="635" y="174" class="lbl lbl-lay" text-anchor="middle">OUTPUT</text>
</svg>
